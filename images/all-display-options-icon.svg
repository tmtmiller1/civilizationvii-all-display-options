<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7eed1"/>
      <stop offset="100%" stop-color="#e7d4a3"/>
    </linearGradient>
  </defs>
  <!-- Monitor bezel -->
  <rect x="6" y="9" width="52" height="36" rx="4.5" fill="#1a222e" stroke="#c9a24c" stroke-width="2.5"/>
  <!-- Panel -->
  <rect x="9.5" y="12.5" width="45" height="29" rx="2.5" fill="url(#screen)"/>
  <!-- Nested resolution frames (every mode up to native) -->
  <g fill="none" stroke="#b8893c" stroke-width="1.6" opacity="0.9">
    <rect x="16" y="17.5" width="32" height="19" rx="1.6"/>
    <rect x="23" y="22"   width="18" height="10" rx="1.3"/>
  </g>
  <!-- Stand -->
  <rect x="28" y="45" width="8" height="6" fill="#1a222e" stroke="#c9a24c" stroke-width="2"/>
  <rect x="20" y="51" width="24" height="4" rx="2" fill="#1a222e" stroke="#c9a24c" stroke-width="2"/>
</svg>
