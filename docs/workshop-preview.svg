<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243042"/>
      <stop offset="100%" stop-color="#121821"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7eed1"/>
      <stop offset="100%" stop-color="#e7d4a3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Gold frame echoing the in-game parchment/gold palette -->
  <rect x="26" y="26" width="972" height="972" rx="30" fill="none" stroke="#c9a24c" stroke-width="4" opacity="0.5"/>

  <!-- Monitor icon: a screen with nested rectangles (every resolution up to native) -->
  <g transform="translate(512,360)">
    <!-- bezel -->
    <rect x="-230" y="-160" width="460" height="320" rx="22" fill="#1a222e" stroke="#c9a24c" stroke-width="6"/>
    <!-- panel -->
    <rect x="-204" y="-134" width="408" height="268" rx="10" fill="url(#screen)"/>
    <!-- nested resolution frames -->
    <g fill="none" stroke="#b8893c" stroke-width="5" opacity="0.85">
      <rect x="-150" y="-98" width="300" height="196" rx="6"/>
      <rect x="-96"  y="-62" width="192" height="124" rx="5"/>
      <rect x="-46"  y="-30" width="92"  height="60"  rx="4"/>
    </g>
    <!-- stand -->
    <rect x="-30" y="160" width="60" height="40" fill="#1a222e" stroke="#c9a24c" stroke-width="5"/>
    <rect x="-96" y="200" width="192" height="22" rx="11" fill="#1a222e" stroke="#c9a24c" stroke-width="5"/>
  </g>

  <!-- Wordmark (two lines so it stays large and legible) -->
  <text x="512" y="700" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="66"
        font-weight="bold" fill="#e7d4a3" letter-spacing="1">ALL DISPLAY &amp;</text>
  <text x="512" y="788" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="66"
        font-weight="bold" fill="#e7d4a3" letter-spacing="1">RESOLUTION OPTIONS</text>
  <!-- Tagline -->
  <text x="512" y="868" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="38"
        fill="#c9a24c" opacity="0.92">Resolution &#183; UI Scale &#183; Auto-scale &#183; Presets</text>
</svg>
